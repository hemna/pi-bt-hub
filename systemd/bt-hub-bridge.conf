# Drop-in override for pi-bt-hub with bridge integration
# Install to: /etc/systemd/system/bt-hub.service.d/bridge.conf
#
# This configures bt-hub to:
# 1. Wait for bt-bridge.service to start
# 2. Enable bridge integration in the app
#
# To install manually:
#   sudo mkdir -p /etc/systemd/system/bt-hub.service.d
#   sudo cp bt-hub-bridge.conf /etc/systemd/system/bt-hub.service.d/bridge.conf
#   sudo systemctl daemon-reload
#   sudo systemctl restart bt-hub

[Unit]
# Start bt-bridge.service if available (Wants= is a soft dependency)
Wants=bt-bridge.service
# Wait for bt-bridge to start before starting bt-hub
After=bt-bridge.service

[Service]
# Enable bridge integration
Environment=BT_HUB_BRIDGE_ENABLED=true
Environment=BT_HUB_BRIDGE_URL=http://localhost:8081
