{# Favorite button partial for device detail page #}

<button class="favorite-btn {% if device.is_favorite %}favorite-btn--active{% endif %}"
        hx-post="/api/devices/{{ device.mac_address }}/favorite"
        hx-vals='{"is_favorite": "{{ "false" if device.is_favorite else "true" }}"}'
        hx-target="#detail-favorite-{{ device.mac_address | replace(':', '-') }}"
        hx-swap="outerHTML"
        id="detail-favorite-{{ device.mac_address | replace(':', '-') }}"
        title="{{ 'Remove from favorites' if device.is_favorite else 'Add to favorites' }}">
  {% if device.is_favorite %}&#9733;{% else %}&#9734;{% endif %}
</button>
