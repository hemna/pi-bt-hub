{# Ignore button partial for device detail page #}

<button class="ignore-btn {% if device.is_ignored %}ignore-btn--active{% endif %}"
        hx-post="/api/devices/{{ device.mac_address }}/ignore"
        hx-vals='{"is_ignored": "{{ "false" if device.is_ignored else "true" }}"}'
        hx-target="#detail-ignored-{{ device.mac_address | replace(':', '-') }}"
        hx-swap="outerHTML"
        id="detail-ignored-{{ device.mac_address | replace(':', '-') }}"
        data-tooltip="{{ 'Stop ignoring' if device.is_ignored else 'Ignore this device' }}">
  {% if device.is_ignored %}&#128065;{% else %}&#128064;{% endif %}
</button>
