{# Scan in progress — replaces #device-list while scanning #}

<div class="scan-progress"
     x-data="{
       devices: [],
       scanning: true,
       countdown: {{ duration | default(10) }},
       init() {
          // Periodically fetch devices during scan to catch discoveries
          this._fetchDevices();
          this._pollTimer = setInterval(() => {
            if (this.scanning) this._fetchDevices();
          }, 3000);

          // Countdown timer (visual only — actual stop comes from server via WebSocket)
          this._timer = setInterval(() => {
            if (this.countdown > 0) {
              this.countdown--;
            } else {
              clearInterval(this._timer);
            }
          }, 1000);

          // Fallback: if no scan_stopped event within duration + generous buffer,
          // mark as complete. The background task may take extra time due to
          // bridge stop and hcitool classic scan.
          setTimeout(() => {
            if (this.scanning) {
              this.scanning = false;
              clearInterval(this._timer);
              if (this._pollTimer) clearInterval(this._pollTimer);
              window.dispatchEvent(new CustomEvent('scan-stopped'));
              // Delayed fetch — give BlueZ a moment after stop
              setTimeout(() => this._fetchDevices(), 1000);
            }
          }, {{ (duration | default(10)) * 1000 + 15000 }});
        },
        _fetchDevices() {
          fetch('/api/devices')
            .then(r => r.json())
            .then(data => {
              if (data.devices) {
                data.devices.forEach(d => {
                  if (!this.devices.find(dev => dev.mac_address === d.mac_address)) {
                    this.devices.push({
                      mac_address: d.mac_address,
                      name: d.name || d.mac_address,
                      rssi: d.rssi,
                      paired: d.paired || false,
                      connected: d.connected || false,
                      device_type: d.device_type || null
                    });
                  } else {
                    // Update existing device
                    const idx = this.devices.findIndex(dev => dev.mac_address === d.mac_address);
                    if (d.rssi) this.devices[idx].rssi = d.rssi;
                    if (d.name) this.devices[idx].name = d.name;
                    if (d.connected !== undefined) this.devices[idx].connected = d.connected;
                    if (d.paired !== undefined) this.devices[idx].paired = d.paired;
                  }
                });
              }
            })
            .catch(() => {});
        }
     }"
      @bt-ws-message.window="
        if ($event.detail.type === 'device_discovered') {
          const d = $event.detail;
          const idx = devices.findIndex(dev => dev.mac_address === d.mac_address);
          if (idx === -1) {
           devices.unshift({
              mac_address: d.mac_address,
              name: d.name || d.mac_address,
              rssi: d.rssi,
              paired: d.paired || false,
              connected: d.connected || false,
              device_type: d.device_type || null
            });
          } else {
            // Update RSSI for already-seen device
            if (d.rssi) devices[idx].rssi = d.rssi;
            if (d.name) devices[idx].name = d.name;
          }
        } else if ($event.detail.type === 'device_updated') {
          const d = $event.detail;
          const mac = d.mac_address;
          const props = d.properties || d;
          const idx = devices.findIndex(dev => dev.mac_address === mac);
          if (idx !== -1) {
            if (props.rssi || props.RSSI) devices[idx].rssi = props.rssi || props.RSSI;
            if (props.name || props.Name) devices[idx].name = props.name || props.Name;
            if (props.connected !== undefined || props.Connected !== undefined) devices[idx].connected = props.connected ?? props.Connected;
            if (props.paired !== undefined || props.Paired !== undefined) devices[idx].paired = props.paired ?? props.Paired;
          }
        } else if ($event.detail.type === 'scan_stopped') {
          scanning = false;
          countdown = 0;
          if (this._timer) clearInterval(this._timer);
          if (this._pollTimer) clearInterval(this._pollTimer);
          window.dispatchEvent(new CustomEvent('scan-stopped'));
          // Fetch immediately (before BlueZ evicts) and again after a moment
          this._fetchDevices();
          setTimeout(() => this._fetchDevices(), 1500);
        }
      ">

  <!-- Scan status bar -->
  <div class="flex items-center gap-2 mb-4" style="padding: 0.75rem 1rem; background: var(--card-bg); border-radius: var(--radius); border: 1px solid var(--border-color);">
    <template x-if="scanning">
      <span class="spinner spinner--sm"></span>
    </template>
    <template x-if="!scanning">
      <span style="color: var(--green);">&#10003;</span>
    </template>
    <strong>
      <span x-show="scanning" x-text="'Scanning... ' + countdown + 's remaining'"></span>
      <span x-show="!scanning">Scan complete</span>
    </strong>
    <span class="text-secondary" style="margin-left: auto;" x-text="devices.length + ' device(s) found'"></span>
  </div>

  <!-- Live device grid -->
  <div class="device-grid">
    <template x-for="device in devices" :key="device.mac_address">
      <div class="device-card">
        <div class="device-card__top">
          <div class="device-icon">&#128225;</div>
          <div class="device-card__info">
            <div class="device-card__name">
              <a :href="'/devices/' + device.mac_address" x-text="device.name || device.mac_address"></a>
            </div>
            <div class="device-card__mac" x-text="device.mac_address"></div>
            <div class="device-card__meta">
              <template x-if="device.connected">
                <span class="badge badge--connected">Connected</span>
              </template>
              <template x-if="device.paired && !device.connected">
                <span class="badge badge--on">Paired</span>
              </template>
              <template x-if="!device.paired && !device.connected">
                <span class="badge badge--disconnected">Discovered</span>
              </template>
              <template x-if="device.rssi">
                <span class="signal-badge" :data-tooltip="device.rssi + ' dBm'">
                  <span class="signal-meter"
                        :class="{
                          'signal-meter--excellent': device.rssi >= -50,
                          'signal-meter--good': device.rssi >= -70 && device.rssi < -50,
                          'signal-meter--fair': device.rssi >= -85 && device.rssi < -70,
                          'signal-meter--weak': device.rssi < -85
                        }">
                    <span class="signal-meter__bar" :class="{ 'signal-meter__bar--active': device.rssi >= -100 }"></span>
                    <span class="signal-meter__bar" :class="{ 'signal-meter__bar--active': device.rssi >= -85 }"></span>
                    <span class="signal-meter__bar" :class="{ 'signal-meter__bar--active': device.rssi >= -70 }"></span>
                    <span class="signal-meter__bar" :class="{ 'signal-meter__bar--active': device.rssi >= -50 }"></span>
                  </span>
                  <span x-text="device.rssi + 'dBm'"></span>
                </span>
              </template>
            </div>
          </div>
        </div>
        <div class="device-card__bottom">
          <div class="flex gap-1">
            <a :href="'/devices/' + device.mac_address" class="btn btn--secondary btn--sm">Details</a>
            <template x-if="device.paired && !device.connected">
              <button class="btn btn--success btn--sm"
                      @click="
                        $el.disabled = true; $el.textContent = 'Connecting...';
                        fetch('/api/devices/' + encodeURIComponent(device.mac_address) + '/connect', {method: 'POST'})
                          .then(r => { if (!r.ok) return r.json().then(d => { throw new Error(d.detail?.message || d.message || 'Connection failed') });
                            device.connected = true;
                            Alpine.store('toasts')?.success('Connected to ' + (device.name || device.mac_address));
                          })
                          .catch(e => Alpine.store('toasts')?.error(e.message))
                          .finally(() => { $el.disabled = false; $el.textContent = 'Connect'; });
                      ">Connect</button>
            </template>
            <template x-if="!device.paired && !device.connected">
              <button class="btn btn--primary btn--sm"
                      @click="
                        $el.disabled = true; $el.textContent = 'Pairing...';
                        fetch('/api/devices/' + encodeURIComponent(device.mac_address) + '/pair', {method: 'POST'})
                          .then(r => { if (!r.ok) return r.json().then(d => { throw new Error(d.detail?.message || d.message || 'Pairing failed') });
                            device.paired = true;
                            Alpine.store('toasts')?.success('Paired with ' + (device.name || device.mac_address));
                          })
                          .catch(e => Alpine.store('toasts')?.error(e.message))
                          .finally(() => { $el.disabled = false; $el.textContent = 'Pair'; });
                      ">Pair</button>
            </template>
          </div>
        </div>
      </div>
    </template>
  </div>

  <!-- Empty state while scanning -->
  <template x-if="devices.length === 0 && scanning">
    <div class="empty-state" style="padding: 2rem;">
      <div class="empty-state__icon">&#128225;</div>
      <p class="empty-state__text">Waiting for devices to appear...<br>Make sure your Bluetooth device is powered on and discoverable.</p>
    </div>
  </template>

  <!-- Empty state after scan complete -->
  <template x-if="devices.length === 0 && !scanning">
    <div class="empty-state" style="padding: 2rem;">
      <div class="empty-state__icon">&#128225;</div>
      <div class="empty-state__title">No devices found</div>
      <p class="empty-state__text">No new Bluetooth devices were discovered. Make sure devices are nearby and in pairing mode.</p>
    </div>
  </template>
</div>
