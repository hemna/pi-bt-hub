{# Scan in progress — replaces #device-list while scanning #}

<div class="scan-progress"
     x-data="{
       devices: [],
       scanning: true,
       countdown: {{ duration | default(10) }},
       init() {
         // Fetch devices BlueZ already knows about so the list isn't empty
         fetch('/api/devices')
           .then(r => r.json())
           .then(data => {
             if (data.devices) {
               data.devices.forEach(d => {
                 if (!this.devices.find(dev => dev.mac_address === d.mac_address)) {
                   this.devices.push({
                     mac_address: d.mac_address,
                     name: d.alias || d.name || d.mac_address,
                     rssi: d.rssi || null,
                     paired: d.paired || false,
                     connected: d.connected || false,
                     device_type: d.device_type || null
                   });
                 }
               });
             }
           })
           .catch(() => {});

         // Countdown timer
         this._timer = setInterval(() => {
           if (this.countdown > 0) {
             this.countdown--;
           } else {
             clearInterval(this._timer);
           }
         }, 1000);

         // Fallback: reload the page after scan duration + buffer,
         // in case the WebSocket scan_stopped event is missed.
         setTimeout(() => {
           if (this.scanning) {
             this.scanning = false;
             clearInterval(this._timer);
             window.location.reload();
           }
         }, {{ (duration | default(10)) * 1000 + 3000 }});
       }
     }"
     @bt-ws-message.window="
       if ($event.detail.type === 'device_discovered') {
         const d = $event.detail;
         const idx = devices.findIndex(dev => dev.mac_address === d.mac_address);
         if (idx === -1) {
           devices.unshift({
             mac_address: d.mac_address,
             name: d.name || d.alias || d.mac_address,
             rssi: d.rssi,
             paired: d.paired || false,
             connected: d.connected || false,
             device_type: d.device_type || null
           });
         } else {
           // Update RSSI for already-seen device
           if (d.rssi) devices[idx].rssi = d.rssi;
         }
       } else if ($event.detail.type === 'device_updated') {
         const d = $event.detail;
         const idx = devices.findIndex(dev => dev.mac_address === d.mac_address);
         if (idx !== -1) {
           if (d.rssi) devices[idx].rssi = d.rssi;
           if (d.name) devices[idx].name = d.name;
           if (d.connected !== undefined) devices[idx].connected = d.connected;
           if (d.paired !== undefined) devices[idx].paired = d.paired;
         }
       } else if ($event.detail.type === 'scan_stopped') {
         scanning = false;
         countdown = 0;
         if (this._timer) clearInterval(this._timer);
         window.location.reload();
       }
     ">

  <!-- Scan status bar -->
  <div class="flex items-center gap-2 mb-4" style="padding: 0.75rem 1rem; background: var(--card-bg); border-radius: var(--radius); border: 1px solid var(--border-color);">
    <template x-if="scanning">
      <span class="spinner spinner--sm"></span>
    </template>
    <template x-if="!scanning">
      <span style="color: var(--green);">&#10003;</span>
    </template>
    <strong>
      <span x-show="scanning" x-text="'Scanning... ' + countdown + 's remaining'"></span>
      <span x-show="!scanning">Scan complete</span>
    </strong>
    <span class="text-secondary" style="margin-left: auto;" x-text="devices.length + ' device(s) found'"></span>
  </div>

  <!-- Live device grid -->
  <div class="device-grid">
    <template x-for="device in devices" :key="device.mac_address">
      <div class="device-card">
        <div class="device-card__top">
          <div class="device-icon">&#128225;</div>
          <div class="device-card__info">
            <div class="device-card__name">
              <a :href="'/devices/' + device.mac_address" x-text="device.name || device.mac_address"></a>
            </div>
            <div class="device-card__mac" x-text="device.mac_address"></div>
            <div class="device-card__meta">
              <template x-if="device.connected">
                <span class="badge badge--connected">Connected</span>
              </template>
              <template x-if="device.paired && !device.connected">
                <span class="badge badge--on">Paired</span>
              </template>
              <template x-if="!device.paired && !device.connected">
                <span class="badge badge--disconnected">Discovered</span>
              </template>
              <template x-if="device.rssi">
                <span class="badge" x-text="device.rssi + ' dBm'" style="font-size: 0.75rem;"></span>
              </template>
            </div>
          </div>
        </div>
        <div class="device-card__bottom">
          <span class="device-card__time" x-text="'Just now'"></span>
          <div class="flex gap-1">
            <a :href="'/devices/' + device.mac_address" class="btn btn--secondary btn--sm">Details</a>
          </div>
        </div>
      </div>
    </template>
  </div>

  <!-- Empty state while scanning -->
  <template x-if="devices.length === 0 && scanning">
    <div class="empty-state" style="padding: 2rem;">
      <div class="empty-state__icon">&#128225;</div>
      <p class="empty-state__text">Waiting for devices to appear...<br>Make sure your Bluetooth device is powered on and discoverable.</p>
    </div>
  </template>

  <!-- Empty state after scan complete -->
  <template x-if="devices.length === 0 && !scanning">
    <div class="empty-state" style="padding: 2rem;">
      <div class="empty-state__icon">&#128225;</div>
      <div class="empty-state__title">No devices found</div>
      <p class="empty-state__text">No new Bluetooth devices were discovered. Make sure devices are nearby and in pairing mode.</p>
    </div>
  </template>
</div>
